<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Admin — Balance</title>
    <!-- estilos comunes (dark theme, botones, responsive) similares a admin_solicitudes -->
    <link rel="stylesheet" href="/css/tailwind.min.css">
    <style>
        :root {
            --color-primary: #581c87;
            --color-secondary: #f0abfc;
            --color-rustic: #44403c;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: #0c0a09;
            min-height: 100vh;
            color: #d6d3d1;
        }

        header.bg-rustic {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 9999;
        }
    </style>
    <!-- agrego un query string para forzar recarga cuando se actualiza el JS/CSS -->
    <link rel="stylesheet" href="admin_balance.css?v=10">
    <script src="./navbar.js"></script>
</head>

<body>
    <main class="container">
        <h1 class="text-center text-secondary text-2xl pt-20">Admin — Balance</h1>

        <!-- Banner de notificación (verde para nuevos ingresos) -->
        <div id="banner" class="banner hidden" role="status" aria-live="polite"></div>

        <!-- controles principales -->
        <div class="controls small justify-between my-4">
            <div class="flex gap-2">
                <button id="check-btn" class="btn btn-green">Actualizar</button>
                <button id="view-all-btn" class="btn">Ver todas las transacciones</button>
            </div>
            <div class="flex gap-2">

                <button id="filter-btn" class="btn">Sin filtro</button>
                <button id="toggle-balance-btn" class="btn">Mostrar saldo</button>
            </div>
        </div>

        <section class="balance-section hidden">
            <h2>Saldo disponible</h2>
            <div id="balance-amount" class="balance-amount">—</div>
            <div class="controls">
                <button id="refresh-btn" class="btn">Actualizar</button>
                <span id="status" class="status">conectando...</span>
            </div>
        </section>

        <section class="tx-section">
            <h2>Últimos movimientos</h2>


            <table class="tx-table" aria-live="polite">
                <thead>
                    <tr>
                        <th class="tx-col-name">Nombre</th>
                        <th class="tx-col-desc">Descripción</th>
                        <th class="tx-col-amount">Monto</th>
                        <th class="tx-col-date">Fecha</th>
                        <th class="tx-col-time">Hora</th>
                    </tr>
                </thead>
                <tbody id="tx-list"></tbody>
            </table>
        </section>
    </main>

    <script src="admin_balance.js?v=10"></script>
</body>

</html>
