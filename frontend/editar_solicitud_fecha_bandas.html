                             onmouseover="this.style.background='#2a2a2a'" 
                             onmouseout="this.style.background='transparent'"
                             onclick="seleccionarClienteExistente(${cliente.id_cliente}, '${escapeHtml(cliente.nombre || '')}', '${escapeHtml(cliente.email || '')}', '${escapeHtml(cliente.telefono || '')}')">
                            <div style="font-weight:bold;color:var(--color-secondary);">${escapeHtml(cliente.nombre || 'Sin nombre')}</div>
                            ${cliente.email ? `<div style="font-size:0.85rem;color:#9ca3af;">${escapeHtml(cliente.email)}</div>` : ''}
                            ${cliente.telefono ? `<div style="font-size:0.85rem;color:#9ca3af;">${escapeHtml(cliente.telefono)}</div>` : ''}
                        </div>
                    `).join('');
                } else {
                    console.error('Error searching clientes:', res.status);
                }
            } catch (err) {
                console.error('[CLIENTES] Error en búsqueda:', err);
            }
        }

        function seleccionarClienteExistente(idCliente, nombre, email, telefono) {
            // Actualizar campos del modal
            document.getElementById('modalClienteId').value = idCliente;
            document.getElementById('modalClienteIdDisplay').textContent = idCliente;
            document.getElementById('modalClienteNombre').value = nombre;
            document.getElementById('modalClienteEmail').value = email;
            document.getElementById('modalClienteTelefono').value = telefono;
            // Actualizar el ID del cliente actual
            document.getElementById('clienteId').value = idCliente;
            // Limpiar búsqueda
            document.getElementById('modalBuscadorClienteInput').value = '';
            document.getElementById('modalBuscadorResultados').innerHTML = '';
            showNotification(`Cliente seleccionado: ${nombre}`, 'success');
        }

        function closeEditClienteModal() {
            const modal = document.getElementById('clienteModal');
            if (modal) modal.style.display = 'none';
            document.getElementById('modalBuscadorClienteInput').value = '';
            document.getElementById('modalBuscadorResultados').innerHTML = '';
        }

        async function saveClienteModal() {
            const id = document.getElementById('clienteId').value;
            const nombre = document.getElementById('modalClienteNombre').value.trim();
            const email = document.getElementById('modalClienteEmail').value.trim();
            const telefono = document.getElementById('modalClienteTelefono').value.trim();

            if (!nombre && !email && !telefono) {
                showNotification('Debe completar al menos un campo.', 'warning');
                return;
            }

            // Validar formato de email si se proporciona
            if (email && !isValidEmail(email)) {
                showNotification('Email inválido. Debe tener formato correcto (ej: ejemplo@dominio.com)', 'error');
                return;
            }

            try {
                const token = localStorage.getItem('authToken');
                console.log('[CLIENTES] 🔐 Token:', token ? token.substring(0, 20) + '...' : 'ninguno');

                const res = await fetch(`/api/admin/clientes/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ nombre, email, telefono })
                });

                const data = await res.json();
                console.log('[CLIENTES] Status:', res.status, '| Respuesta:', data);

                if (!res.ok) {
                    // Detectar si es error de email duplicado
                    if (res.status === 400 && (data.error || data.message || '').includes('email')) {
                        showNotification('Este email ya está registrado en otro cliente.', 'error');
                    } else {
                        showNotification(data.error || data.message || 'Error al actualizar cliente', 'error');
                    }
                    return;
                }

                // Éxito - actualizar campos visibles y guardar id_cliente en la solicitud
                const clienteIdFromModal = document.getElementById('modalClienteId').value;
                if (clienteIdFromModal) {
                    document.getElementById('clienteId').value = clienteIdFromModal;
                }
                document.getElementById('nombreContacto').value = nombre;
                document.getElementById('emailContacto').value = email;
                document.getElementById('telefonoContacto').value = telefono;

                // Ahora actualizar la solicitud con el id_cliente (si existe solicitud abierta)
                if (eventoId) {
                    console.log('[CLIENTES] 📝 Actualizando solicitud', eventoId, 'con id_cliente:', clienteIdFromModal);
                    try {
                        const resUpdate = await fetch(`/api/solicitudes-fechas-bandas/${eventoId}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify({ id_cliente: clienteIdFromModal })
                        });

                        const dataUpdate = await resUpdate.json();
                        console.log('[CLIENTES] 📝 Solicitud actualizada - Status:', resUpdate.status, '| Respuesta:', dataUpdate);

                        if (!resUpdate.ok) {
                            console.warn('[CLIENTES] ⚠ Advertencia al actualizar solicitud:', dataUpdate);
                        } else {
                            console.log('[CLIENTES] ✓ Solicitud actualizada correctamente con id_cliente:', clienteIdFromModal);
                        }
                    } catch (errUpdate) {
                        console.error('[CLIENTES] Error actualizando solicitud:', errUpdate);
                    }
                }

                showNotification('Cliente actualizado y solicitud guardada', 'success');
                closeEditClienteModal();

            } catch (err) {
                console.error('[CLIENTES] Error:', err);
                showNotification('Error al actualizar cliente: ' + (err.message || ''), 'error');
            }
        }

        // Modal HTML (insertado dinámicamente al final del body)
        document.body.insertAdjacentHTML('beforeend', `
        <div id="clienteModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:10000;">
            <div style="background:#1a1a1a;padding:20px;border-radius:8px;max-width:500px;width:90%;color:#d6d3d1;max-height:80vh;overflow-y:auto;">
                <h3 style="margin-top:0;">Editar Cliente</h3>
                
                <!-- Sección de búsqueda de clientes existentes -->
                <div style="margin-bottom:20px;padding:12px;background:#2a2a2a;border:1px solid #374151;border-radius:6px;">
                    <label style="display:block;margin-bottom:8px;font-size:0.9rem;color:#f0abfc;">Buscar cliente existente (opcional):</label>
                    <input type="text" id="modalBuscadorClienteInput" placeholder="Nombre, email o teléfono..." 
                        style="width:100%;padding:8px;background:#1a1a1a;border:1px solid #444;color:#d6d3d1;border-radius:4px;margin-bottom:8px;"
                        onkeyup='buscarClientes(this.value)'>
                    <div id="modalBuscadorResultados" style="background:#0f172a;border:1px solid #374151;border-radius:4px;max-height:200px;overflow-y:auto;"></div>
                </div>
                
                <hr style="border:none;border-top:1px solid #374151;margin:15px 0;">
                
                <!-- ID del cliente (oculto pero accesible) -->
                <input type="hidden" id="modalClienteId" value="">
                
                <!-- Sección de edición manual -->
                <div style="margin-bottom:10px;">
                    <label style="font-size:0.85rem;color:#9ca3af;">ID Cliente: <span id="modalClienteIdDisplay">-</span></label>
                </div>
                <div style="margin-bottom:10px;">
                    <label>Nombre</label>
                    <input type="text" id="modalClienteNombre" style="width:100%;padding:6px;background:#2a2a2a;border:1px solid #444;color:#d6d3d1;border-radius:4px;">
                </div>
                <div style="margin-bottom:10px;">
                    <label>Email</label>
                    <input type="email" id="modalClienteEmail" style="width:100%;padding:6px;background:#2a2a2a;border:1px solid #444;color:#d6d3d1;border-radius:4px;">
                </div>
                <div style="margin-bottom:15px;">
                    <label>Teléfono</label>
                    <input type="tel" id="modalClienteTelefono" style="width:100%;padding:6px;background:#2a2a2a;border:1px solid #444;color:#d6d3d1;border-radius:4px;">
                </div>
                <div style="text-align:right;">
                    <button class="btn btn-secondary" onclick="closeEditClienteModal()" style="margin-right:8px;">Cancelar</button>
                    <button class="btn btn-primary" onclick="saveClienteModal()">Guardar</button>
                </div>
            </div>
        </div>
        `);

        /* ================ FIN MODAL DE CLIENTE ================ */

    </script>

    <script>
    </script>
</body>

</html>
