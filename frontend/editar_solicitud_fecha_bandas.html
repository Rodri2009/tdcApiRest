<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Evento - Bandas</title>
    <link rel="stylesheet" href="/css/tailwind.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="/css/fontawesome.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
    <style>
        :root {
            --color-primary: #581c87;
            --color-secondary: #f0abfc;
            --color-rustic: #44403c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0c0a09;
            color: #d6d3d1;
        }

        .text-neon {
            color: var(--color-secondary);
            text-shadow: 0 0 5px var(--color-secondary), 0 0 10px var(--color-secondary);
        }

        .bg-rustic {
            background-color: var(--color-rustic);
        }

        .wrap {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .container {
            max-width: 98%;
            margin: 20px auto;
            background-color: #1e293b;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid var(--color-rustic);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        h2 {
            text-align: center;
            margin-bottom: 5px;
            font-size: 2rem;
            font-weight: bold;
            color: var(--color-secondary);
            text-shadow: 0 0 5px var(--color-secondary), 0 0 10px var(--color-secondary);
        }

        .subtitle {
            text-align: center;
            color: #9ca3af;
            margin-bottom: 25px;
        }

        .form-section {
            background: #0f172a;
            border: 1px solid #581c87;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .form-section h3 {
            color: var(--color-secondary);
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #581c87;
        }

        /* Copiado de solicitud_fecha_bandas.html: estilos para bandas, info-banner y date-slot */
        .info-banner {
            background-color: rgba(88, 28, 135, 0.12);
            border: 1px solid var(--color-secondary);
            border-radius: 6px;
            padding: 12px;
            margin: 15px 0;
            color: #d6d3d1;
            font-size: 0.95rem;
        }

        .banda-item {
            background-color: #0f172a;
            border: 1px solid #581c87;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .banda-item:hover {
            border-color: var(--color-secondary);
        }

        .banda-item.selected {
            background-color: rgba(88, 28, 135, 0.25);
            border-color: var(--color-secondary);
        }

        .banda-item-text {
            flex: 1;
        }

        .banda-item-name {
            color: var(--color-secondary);
            font-weight: bold;
        }

        .banda-item-genre {
            color: #9ca3af;
            font-size: 0.9rem;
        }

        /* GRID DE BANDAS */
        .band-list-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            background-color: #0f172a;
            border: 1px solid #581c87;
            border-radius: 8px;
            margin-top: 8px;
        }

        .banda-grid-item {
            background-color: #0f172a;
            border: 2px solid #581c87;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .banda-grid-item:hover {
            border-color: var(--color-secondary);
            background-color: rgba(88, 28, 135, 0.15);
            transform: translateY(-2px);
        }

        .banda-grid-item.selected {
            background-color: rgba(88, 28, 135, 0.3);
            border-color: var(--color-secondary);
            box-shadow: 0 0 15px rgba(240, 171, 252, 0.3);
        }

        .banda-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .banda-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banda-logo-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 1.5rem;
        }

        .banda-grid-name {
            color: var(--color-secondary);
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            word-break: break-word;
        }

        .banda-grid-genre {
            color: #9ca3af;
            font-size: 0.75rem;
            text-align: center;
        }

        .checkbox-custom {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 2px solid #581c87;
            background-color: transparent;
            transition: all 0.2s;
        }

        .checkbox-custom.checked {
            background-color: var(--color-secondary);
            border-color: var(--color-secondary);
        }

        .checkbox-custom i {
            color: #1f2937;
            font-size: 0.8rem;
        }

        /* BANDAS SELECCIONADAS CON NUMERACIÓN */
        .bandas-seleccionadas-container {
            background: linear-gradient(135deg, rgba(88, 28, 135, 0.1) 0%, rgba(240, 171, 252, 0.05) 100%);
            border: 2px solid var(--color-secondary);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(240, 171, 252, 0.1);
        }

        .bandas-seleccionadas-titulo {
            color: var(--color-secondary);
            font-size: 1.1rem;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(240, 171, 252, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .banda-seleccionada-item {
            background-color: #0f172a;
            border: 1px solid rgba(240, 171, 252, 0.2);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .banda-numero {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-secondary) 0%, #c84ade 100%);
            color: #1f2937;
            font-weight: bold;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .banda-seleccionada-info {
            flex: 1;
        }

        .banda-seleccionada-nombre {
            color: var(--color-secondary);
            font-weight: bold;
        }

        .banda-seleccionada-genre {
            color: #9ca3af;
            font-size: 0.85rem;
            margin-top: 2px;
        }

        .banda-seleccionada-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-reorder {
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            transition: all 0.2s;
        }

        .btn-reorder:hover {
            color: var(--color-secondary);
            transform: scale(1.2);
        }

        .btn-remove {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            transition: all 0.2s;
        }

        .btn-remove:hover {
            color: #ff6b6b;
            transform: scale(1.2);
        }

        .date-slot {
            background-color: #0f172a;
            border: 1px solid #581c87;
            border-radius: 6px;
            padding: 12px;
            margin: 8px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }


        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 640px) {
            .form-grid-2 {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-grid-3 {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #d6d3d1;
            font-size: 0.9rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 8px !important;
            border: 1.5px solid #581c87;
            border-radius: 6px;
            background-color: #0f172a;
            color: #f8fafc;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--color-secondary);
            box-shadow: 0 0 5px var(--color-secondary);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .estado-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .estado-solicitado {
            background: #fef3c7;
            color: #92400e;
        }

        .estado-contactado {
            background: #dbeafe;
            color: #1e40af;
        }

        .estado-confirmado {
            background: #d1fae5;
            color: #065f46;
        }

        .estado-cancelado {
            background: #fee2e2;
            color: #991b1b;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: transparent;
            color: var(--color-secondary);
            border: 2px solid var(--color-secondary);
        }

        .btn-primary:hover {
            background: rgba(132, 63, 172, 0.2);
            transform: scale(1.05);
        }

        .btn-secondary {
            background: #44403c;
            color: #d6d3d1;
        }

        .btn-secondary:hover {
            background: #57534e;
        }

        .btn-danger {
            background: #dc2626;
            color: white;
        }

        .btn-danger:hover {
            background: #b91c1c;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            border: 4px solid #4b5563;
            border-top: 4px solid var(--color-secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #notification-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translate(-50%, 150%);
            padding: 12px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 500;
            z-index: 1001;
            transition: transform 0.4s ease;
        }

        #notification-banner.show {
            transform: translate(-50%, 0);
        }

        #notification-banner.success {
            background: #10b981;
        }

        #notification-banner.error {
            background: #ef4444;
        }

        #notification-banner.warning {
            background: #f59e0b;
        }

        /* FLYER PREVIEW - Similar a logo-preview */
        .flyer-form-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .flyer-preview-side {
            flex-shrink: 0;
        }

        #flyerPreview {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            border: 2px dashed #581c87;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        #flyerPreview:hover {
            border-color: var(--color-secondary);
        }

        #flyerPreview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        #flyerPreview .preview-placeholder {
            text-align: center;
            color: #6b7280;
            font-size: 0.85rem;
        }

        .flyer-input-side {
            flex: 1;
        }

        .flyer-input-side .form-group {
            margin-bottom: 0;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .back-btn {
            background: #44403c;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #d6d3d1;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #57534e;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #111827;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <main class="wrap">
        <div class="container">
            <div class="header-row">
                <a href="admin_solicitudes.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Volver
                </a>
                <h2><i class="fas fa-music"></i> Editar Solicitud Banda / Fecha</h2>
                <div style="width: 100px;"></div>
            </div>

            <div class="info-row">
                <div>
                    <span style="color: #9ca3af;">ID:</span>
                    <span id="eventoId" style="font-weight: bold;">-</span>
                    <span style="color: #9ca3af; margin-left: 12px;">Creado:</span>
                    <span id="eventoCreado" style="font-weight: bold;">-</span>
                </div>
                <div>
                    <span style="color: #9ca3af;">Estado:</span>
                    <select id="estadoSelect" class="estado-badge" style="width: auto; padding: 4px 12px;">
                        <option value="Solicitado">Solicitado</option>
                        <option value="Contactado">Contactado</option>
                        <option value="Confirmado">Confirmado</option>
                        <option value="Cancelado">Cancelado</option>
                    </select>
                </div>
            </div>

            <!-- NUEVA SECCIÓN: Nombre de la fecha / show + Flyer -->
            <div class="form-section" style="margin-top: 14px;">
                <h3><i class="fas fa-tag"></i> Nombre de la fecha / show & Flyer</h3>
                <div class="form-grid form-grid-1">
                    <div class="form-group">
                        <label for="nombreEvento">Nombre de la fecha / show</label>
                        <input type="text" id="nombreEvento" placeholder="Ej: Rock Legends — Presentación Oficial">
                    </div>
                    <div class="form-group">
                        <label for="descripcion">Descripción (opcional)</label>
                        <textarea id="descripcion"
                            placeholder="Descripción corta del show (se mostrará en la agenda)"></textarea>
                    </div>
                </div>
                <!-- Flyer con preview a la izquierda -->
                <div class="flyer-form-container" style="margin-top:15px;">
                    <div class="flyer-preview-side">
                        <div id="flyerPreview" onclick="document.getElementById('flyerFile').click()">
                            <div class="preview-placeholder">
                                <i class="fas fa-cloud-arrow-up" style="font-size: 2rem; margin-bottom: 5px;"></i>
                                <div>Click para subir</div>
                            </div>
                        </div>
                    </div>
                    <div class="flyer-input-side">
                        <div class="form-group">
                            <label for="urlFlyer">Flyer (URL o subir)</label>
                            <p class="hint">Pegá la URL del flyer o hacé click en la imagen para subir:</p>
                            <input type="text" id="urlFlyer" placeholder="https://..." onchange="updateFlyerPreview()"
                                oninput="updateFlyerPreview()" style="margin-top: 5px;">
                            <input type="file" id="flyerFile" accept="image/png,image/jpeg" style="display: none;"
                                onchange="handleFlyerUpload()" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECCIÓN BANDAS (modo admin) -->
            <div style="display:flex;gap:12px;align-items:center;justify-content:space-between;margin-top:18px;">
                <h3 style="color:var(--color-secondary);"><i class="fas fa-music"></i> Bandas</h3>
                <button type="button" id="btnCrearBanda" class="btn btn-primary"
                    style="height:36px;padding:6px 10px;font-size:0.9rem;">
                    <i class="fas fa-plus"></i> Crear banda
                </button>
            </div>

            <div class="form-group" style="margin-top:8px;">
                <label for="bandaSearch">Buscar y seleccionar bandas:</label>
                <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
                    <input type="text" id="bandaSearch" placeholder="Buscar por nombre o género..." style="flex:1;">
                    <button type="button" id="btnLimpiarBusqueda" class="btn btn-secondary"
                        style="height:36px;padding:6px 10px;">Limpiar</button>
                </div>
                <div id="bandasList" class="band-list-grid"></div>
            </div>

            <!-- BANDAS SELECCIONADAS CON NUMERACIÓN Y REORDEN -->
            <div class="bandas-seleccionadas-container">
                <div class="bandas-seleccionadas-titulo">
                    <i class="fas fa-star"></i> Bandas Seleccionadas
                </div>
                <div id="listaBandasSeleccionadas"></div>
            </div>

            <!-- Fecha y Horarios -->
            <div class="form-section">
                <h3><i class="fas fa-calendar-days"></i> Fecha y Horarios</h3>
                <!-- lista con selector de fechas -->
                <div id="fechasList" style="margin-bottom:12px;">
                    <select id="fechaSelector" style="width:100%; padding:6px;">
                        <option value="" disabled>Seleccionar fecha...</option>
                        <option value="" id="optFecha0">Fecha principal</option>
                        <option value="" id="optFecha1">Fecha alternativa</option>
                    </select>
                </div>
                <button type="button" class="btn btn-secondary" id="btnEditarFechas" style="margin-bottom:10px;">Editar fechas</button>
                <div id="fechasInputsContainer" class="form-grid form-grid-4" style="display:none;">
                    <div class="form-group">
                        <label for="fechaEvento">Fecha del Evento *</label>
                        <input type="text" id="fechaEvento" placeholder="Seleccionar fecha..." style="display:none;">
                    </div>
                    <div class="form-group">
                        <label for="fechaAlternativa">Fecha alternativa</label>
                        <input type="text" id="fechaAlternativa" placeholder="Seleccionar fecha..." style="display:none;">
                        <div style="margin-top:4px;font-size:0.9rem;">
                            <label><input type="checkbox" id="usarAlt"> Usar alternativa</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="horaInicio">Hora de Inicio</label>
                        <input type="time" id="horaInicio" value="21:00">
                    </div>
                    <div class="form-group">
                        <label for="horaFin">Hora de Fin</label>
                        <input type="time" id="horaFin" value="02:00">
                    </div>
                </div>
                <div class="form-grid form-grid-2" style="margin-top: 15px;">
                    <div class="form-group">
                        <label for="aforoMaximo">Aforo Máximo</label>
                        <input type="number" id="aforoMaximo" value="120" min="1">
                    </div>
                    <div class="form-group">
                        <label for="esPublico">Visibilidad</label>
                        <select id="esPublico">
                            <option value="1">Público (visible en agenda)</option>
                            <option value="0">Privado (solo admin)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Precios -->
            <div class="form-section">
                <h3><i class="fas fa-ticket"></i> Precios de Entrada</h3>
                <div class="form-grid form-grid-2">
                    <div class="form-group">
                        <label for="precioAnticipada">Precio Anticipada</label>
                        <input type="number" id="precioAnticipada" min="0" step="100" placeholder="Ej: 3000">
                    </div>
                    <div class="form-group">
                        <label for="precioPuerta">Precio en Puerta</label>
                        <input type="number" id="precioPuerta" min="0" step="100" placeholder="Ej: 4000">
                    </div>
                </div>
            </div>

            <!-- Contacto -->
            <div class="form-section">
                <h3><i class="fas fa-address-book"></i> Datos de Contacto</h3>
                <!-- Campo oculto: id del cliente asociado -->
                <input type="hidden" id="clienteId" value="" />
                <div class="btn-group" style="margin-bottom:8px;">
                    <button type="button" class="btn btn-secondary" id="btnEditCliente" onclick="openEditClienteModal()"
                        style="flex:0.3; padding:6px 10px; font-size:0.9rem;">
                        <i class="fas fa-edit"></i> Editar Cliente
                    </button>
                </div>
                <div class="form-grid form-grid-3">
                    <div class="form-group">
                        <label for="nombreContacto">Nombre del Contacto</label>
                        <input type="text" id="nombreContacto" placeholder="Responsable/Manager" readonly>
                    </div>
                    <div class="form-group">
                        <label for="emailContacto">Email</label>
                        <input type="email" id="emailContacto" placeholder="email@ejemplo.com" readonly>
                    </div>
                    <div class="form-group">
                        <label for="telefonoContacto">Teléfono</label>
                        <input type="tel" id="telefonoContacto" placeholder="11-1234-5678" readonly>
                    </div>
                </div>
            </div>

            <!-- Botones -->
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="window.location.href='admin_solicitudes.html'">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button class="btn btn-danger" id="btnEliminar" style="flex: 0.5;">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="btn btn-primary" id="btnGuardar">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
            </div>

    <script src="/navbar.js"></script>
    <script>
        /*
         * Cambios introducidos durante marzo 2026:
         * - Declaración de fechasSeleccionadas y helper updateFechaText
         * - Conversión de lista de fechas a <select> con dos opciones (principal/alternativa)
         *   y único botón "Editar fechas" que despliega los inputs.
         * - Eliminados altInput en flatpickr y checkbox usarAlt fuera del contenedor
         * - Corrección de cálculo de horaFin para interpretar números como minutos
         * - Autocompletado de comentarios en solicitud_fecha_bandas
         * - Defaults de hora, duración, aforo 150 en creación y edición
         * - Otras mejoras de usabilidad (ocultar inputs, limpiar selector al editar)
         */
        // Variables globales
        let eventoId = null;
        let eventoPrefix = '';
        let calendario = null;
        let calendarioAlternativa = null;

        // Fechas seleccionadas (fecha principal + alternativa)
        let fechasSeleccionadas = [null, null];

        // Bandas (lista disponible + seleccionadas)
        let bandasDisponibles = [];
        let bandasSeleccionadas = [];

        // Helper: escapar texto para insertar en HTML (previene XSS en nombres/geo)
        function escapeHtml(str) {
            return String(str || '').replace(/[&<>"'`]/g, function (s) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;', '`': '&#96;' })[s];
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Proteger página admin
            // navbarManager ya fue instanciado por navbar.js
            if (!navbarManager || !navbarManager.protectAdminPage()) return;

            // Obtener ID de la URL
            const params = new URLSearchParams(window.location.search);
            const idParam = params.get('id') || params.get('solicitudId');

            console.log('[BANDAS] ===== INICIALIZACIÓN =====');
            console.log('[BANDAS] Parámetro solicitudId recibido:', idParam);

            if (!idParam) {
                showNotification('ID no especificado', 'error');
                setTimeout(() => window.location.href = 'config_bandas.html#eventos', 2000);
                return;
            }

            // Cargar lista de bandas disponibles (para selección)
            loadBandas();

            // Modo nuevo evento
            if (idParam === 'new') {
                eventoId = null;
                document.getElementById('eventoId').textContent = 'Nuevo Evento';
                document.querySelector('h2').textContent = 'Crear Nuevo Evento';
                document.getElementById('btnEliminar').style.display = 'none';
                initCalendario();
                showLoading(false);
                document.getElementById('btnGuardar').addEventListener('click', guardarEvento);
                return;
            }

            // Extraer ID numérico (acepta prefijos como 'ev_', 'bnd_' u otros con sufijo numérico)
            const numericMatch = idParam.toString().match(/(\d+)$/);
            if (numericMatch) {
                eventoId = parseInt(numericMatch[1], 10);
            } else {
                showNotification('ID inválido', 'error');
                console.error('[BANDAS] ID inválido recibido:', idParam);
                return;
            }

            // Mantener prefijo original si aplica (ev_ o bnd_)
            const rawPrefix = idParam.toString().replace(/\d+$/, '');
            eventoPrefix = (rawPrefix === 'ev_' || rawPrefix === 'bnd_' || rawPrefix === '') ? rawPrefix : '';

            console.log('[BANDAS] Después del parsing:');
            console.log('[BANDAS]   idParam:', idParam);
            console.log('[BANDAS]   rawPrefix:', rawPrefix);
            console.log('[BANDAS]   eventoId:', eventoId);
            console.log('[BANDAS]   eventoPrefix:', eventoPrefix);

            document.getElementById('eventoId').textContent = `${eventoPrefix}${eventoId}`;

            // REDIRECCIÓN A LOGIN: Si es una solicitud pública (prefijo bnd_) sin autenticación
            const isPublicRequest = eventoPrefix && eventoPrefix.length > 0;
            const authToken = localStorage.getItem('authToken');
            const hasAuth = authToken && typeof authToken === 'string' && authToken.trim().length > 0;

            console.log('[BANDAS] isPublicRequest:', isPublicRequest);
            console.log('[BANDAS] hasAuth:', hasAuth);
            if (isPublicRequest && !hasAuth) {
                console.log('[BANDAS] Solicitud pública detectada sin autenticación. Redirigiendo a login...');
                // Guardar la URL a la que el usuario intentaba acceder para regresar después del login
                sessionStorage.setItem('redirectAfterLogin', window.location.href);
                window.location.href = 'login.html?mensaje=Debe%20iniciar%20sesión%20como%20administrador%20para%20editar%20eventos';
                return;
            }

            // Inicializar calendario
            initCalendario();

            // Cargar datos del evento
            cargarEvento();

            // Event listeners
            document.getElementById('btnGuardar').addEventListener('click', guardarEvento);
            document.getElementById('btnEliminar').addEventListener('click', eliminarEvento);

            // Recalcular hora de fin cuando cambia la hora de inicio
            document.getElementById('horaInicio').addEventListener('change', calcularHoraFin);
            document.getElementById('horaInicio').addEventListener('input', calcularHoraFin);

            // Recalcular duración cuando cambia horaFin (permitir que el usuario edite manualmente)
            document.getElementById('horaFin').addEventListener('change', calcularDuracion);
            document.getElementById('horaFin').addEventListener('input', calcularDuracion);
        });

        function initCalendario() {
            calendario = flatpickr('#fechaEvento', {
                locale: 'es',
                dateFormat: 'Y-m-d',
                altInput: false,
                //altFormat: 'j \\de F, Y',
                minDate: 'today',
                onChange: (selectedDates, dateStr) => {
                    fechasSeleccionadas[0] = dateStr;
                    updateFechaText(0);
                    // ocultar input una vez seleccionada
                    document.getElementById('fechaEvento').style.display = 'none';
                }
            });
            // alternativa
            calendarioAlternativa = flatpickr('#fechaAlternativa', {
                locale: 'es',
                dateFormat: 'Y-m-d',
                altInput: false,
                //altFormat: 'j \\de F, Y',
                minDate: 'today',
                onChange: (selectedDates, dateStr) => {
                    fechasSeleccionadas[1] = dateStr;
                    updateFechaText(1);
                    document.getElementById('fechaAlternativa').style.display = 'none';
                }
            });
            // listener único para editar fechas
            const btn = document.getElementById('btnEditarFechas');
            if (btn) {
                btn.addEventListener('click', () => {
                    // show inputs container instead of individual inputs
                    const cont = document.getElementById('fechasInputsContainer');
                    cont.style.display = cont.style.display === 'none' ? 'block' : 'none';
                    document.getElementById('fechaEvento').style.display = 'block';
                    document.getElementById('fechaAlternativa').style.display = 'block';
                    if (calendario) calendario.open();
                    // cuando se modifica, limpiar selector
                    const sel = document.getElementById('fechaSelector');
                    if (sel) sel.value = '';
                });
            }
        }

        // Helper para asegurar formato HH:MM (24hs)
        function formatTime24(timeStr) {
            if (!timeStr) return '';
            const parts = timeStr.split(':');
            if (parts.length < 2) return '';
            const h = String(parseInt(parts[0], 10) || 0).padStart(2, '0');
            const m = String(parseInt(parts[1], 10) || 0).padStart(2, '0');
            return `${h}:${m}`;
        }

        // Validar que una hora sea válida (HH:MM en formato 24h)
        function isValidTime(timeStr) {
            if (!timeStr || typeof timeStr !== 'string') return false;
            const match = timeStr.match(/^([0-2][0-9]|23):([0-5][0-9])$/);
            return match !== null;
        }

        // Calcular duración basada en hora de inicio y hora de fin
        // Si horaFin < horaInicio, significa que es del día siguiente
        function calcularDuracion() {
            const horaInicio = document.getElementById('horaInicio').value;
            const horaFin = document.getElementById('horaFin').value;

            if (!horaInicio || !horaFin) {
                console.log('[HORARIOS] Falta horaInicio o horaFin para calcular duración');
                return;
            }

            try {
                const [horaIni, minIni] = horaInicio.split(':').map(Number);
                const [horaFinNum, minFin] = horaFin.split(':').map(Number);

                if (isNaN(horaIni) || isNaN(minIni) || isNaN(horaFinNum) || isNaN(minFin)) {
                    console.error('[HORARIOS] Horas inválidas');
                    return;
                }

                // Convertir a minutos desde medianoche
                const minutosinicio = horaIni * 60 + minIni;
                const minutosfinales = horaFinNum * 60 + minFin;

                let duracionMinutos;
                if (minutosfinales >= minutosinicio) {
                    // Mismo día
                    duracionMinutos = minutosfinales - minutosinicio;
                } else {
                    // Día siguiente (horaFin < horaInicio)
                    duracionMinutos = (24 * 60 - minutosinicio) + minutosfinales;
                }

                const horas = Math.floor(duracionMinutos / 60);
                const minutos = duracionMinutos % 60;

                const duracionStr = minutos > 0 ? `${horas}h ${minutos}m` : `${horas} horas`;
                window.duracionCalculada = `${horas} horas`;  // Guardar en formato "X horas"

                console.log('[HORARIOS] ✓ Duración calculada:', horaInicio, '-', horaFin, '=', duracionStr);
            } catch (err) {
                console.error('[HORARIOS] Error calculando duración:', err);
            }
        }

        // Calcular hora de fin basada en hora de inicio + duración (como string "X horas" o sólo número)
        function calcularHoraFin() {
            const horaInicio = document.getElementById('horaInicio').value;
            const duracionText = document.querySelector('[data-duracion]')?.dataset?.duracion || window.duracionEvento || '';

            if (!horaInicio || !duracionText) {
                console.log('[HORARIOS] Falta horaInicio o duración para calcular horaFin');
                return;
            }

            try {
                // Parsear duración de string como "3 horas" o "180 minutos" o incluso "480" (minutos)
                const duracionMatch = duracionText.match(/(\d+)\s*(hora|horas|minuto|minutos)?/i);
                if (!duracionMatch) {
                    console.warn('[HORARIOS] No se pudo parsear duración:', duracionText);
                    return;
                }

                const valor = parseInt(duracionMatch[1], 10);
                let unidad = (duracionMatch[2] || '').toLowerCase();
                let duracionMinutos;

                if (unidad.includes('hora')) {
                    duracionMinutos = valor * 60;
                } else if (unidad.includes('minuto')) {
                    duracionMinutos = valor;
                } else {
                    // sin unidad: interpretar como minutos si valor > 24, de lo contrario asumir minutos
                    duracionMinutos = valor;
                }

                const [horas, minutos] = horaInicio.split(':').map(Number);

                if (isNaN(horas) || isNaN(minutos) || isNaN(duracionMinutos)) {
                    console.error('[HORARIOS] Valores inválidos:', { horas, minutos, duracionMinutos });
                    return;
                }

                let nuevaHora = horas;
                let nuevosMinutos = minutos + duracionMinutos;

                // Ajustar si minutos exceden 60
                nuevaHora += Math.floor(nuevosMinutos / 60);
                nuevosMinutos = nuevosMinutos % 60;

                // Ajustar si horas exceden 24 (siguiente día)
                nuevaHora = nuevaHora % 24;

                const horaFinStr = String(nuevaHora).padStart(2, '0') + ':' + String(nuevosMinutos).padStart(2, '0');
                document.getElementById('horaFin').value = horaFinStr;
                console.log('[HORARIOS] ✓ Hora fin calculada:', horaInicio, '+', duracionMinutos, 'min =', horaFinStr);
            } catch (err) {
                console.error('[HORARIOS] Error calculando hora fin:', err);
            }
        }

        async function cargarEvento() {
            showLoading(true);
            try {
                console.log('[BANDAS] ========== CARGAR EVENTO ==========');
                console.log('[BANDAS] eventoId:', eventoId);
                console.log('[BANDAS] eventoPrefix:', eventoPrefix);

                let endpoint;
                if (eventoPrefix === 'ev_') {
                    // Acceso público a evento confirmado (desde calendario público)
                    endpoint = `/api/eventos/${eventoId}/detalle-publico`;
                    console.log('[BANDAS] Modo público detectado. Usando endpoint:', endpoint);
                } else {
                    // Acceso tradicional (directo a solicitudes_fechas_bandas)
                    endpoint = `/api/solicitudes-fechas-bandas/${eventoId}`;
                    console.log('[BANDAS] Modo tradicional. Usando endpoint:', endpoint);
                }

                if (!eventoId) {
                    throw new Error('ID de evento no válido');
                }

                const res = await fetch(endpoint);
                console.log('[BANDAS] GET ' + endpoint + ' status: ' + res.status);

                if (!res.ok) {
                    throw new Error('No se pudo cargar la solicitud: ' + res.status);
                }

                const evento = await res.json();
                console.log('[BANDAS] ✓ Evento cargado desde nuevo endpoint:', evento);

                // Normalizar campos recibidos (compatibilidad con nombres SQL/DB)
                // Banda: usar banda_nombre del backend
                if (!evento.nombre_banda && evento.banda_nombre) {
                    evento.nombre_banda = evento.banda_nombre;
                }
                if (!evento.id_banda && evento.banda_id) {
                    evento.id_banda = evento.banda_id;
                }
                // Hora
                if (evento.hora_evento && !evento.hora_inicio) {
                    evento.hora_inicio = evento.hora_evento;
                }
                // Precio
                if (evento.precio_basico && typeof evento.precio_base === 'undefined') {
                    evento.precio_base = evento.precio_basico;
                }
                // Aforo/expectativa
                if (typeof evento.expectativa_publico !== 'undefined' && typeof evento.aforo_maximo === 'undefined') {
                    evento.aforo_maximo = evento.expectativa_publico;
                }
                if (typeof evento.precio_puerta_propuesto !== 'undefined' && typeof evento.precio_puerta === 'undefined') {
                    evento.precio_puerta = evento.precio_puerta_propuesto;
                }
                // Contacto
                if (typeof evento.cliente_nombre !== 'undefined' && typeof evento.contacto_nombre === 'undefined') {
                    evento.contacto_nombre = evento.cliente_nombre;
                }
                if (typeof evento.cliente_email !== 'undefined' && typeof evento.contacto_email === 'undefined') {
                    evento.contacto_email = evento.cliente_email;
                }
                if (typeof evento.cliente_telefono !== 'undefined' && typeof evento.contacto_telefono === 'undefined') {
                    evento.contacto_telefono = evento.cliente_telefono;
                }

                console.log('[BANDAS] Después de normalización - nombre_banda:', evento.nombre_banda, 'id_banda:', evento.id_banda);

                // Usar bandas_json del backend (es un array de objetos con id_banda y nombre)
                if (evento.bandas_json && Array.isArray(evento.bandas_json) && evento.bandas_json.length > 0) {
                    console.log('[BANDAS] ✓ bandas_json cargado correctamente:', evento.bandas_json);
                } else {
                    console.warn('[BANDAS] ⚠ bandas_json vacío o no es array');
                }

                // Llenar formulario usando el objeto 'evento' retornado por la API
                document.getElementById('nombreEvento').value = evento.nombre_evento || evento.nombre_banda || '';
                document.getElementById('descripcion').value = evento.descripcion || '';
                document.getElementById('urlFlyer').value = evento.url_flyer || '';
                // mostrar fecha de creación formateada
                if (evento.creado_en) {
                    const fechaCreado = new Date(evento.creado_en);
                    document.getElementById('eventoCreado').textContent = fechaCreado.toLocaleString('es-AR');
                }

                // Intentar cargar preview, pero no fallar si hay un problema
                try {
                    updateFlyerPreview();
                } catch (err) {
                    console.warn('[BANDAS] Error cargando preview del flyer:', err);
                    // Continuar sin fallar
                }

                // Inicializar selección de bandas con bandas_json del backend
                bandasSeleccionadas = [];

                // Procesar bandas_json del backend (cada banda es {id_banda, nombre, orden_show, es_principal})
                if (evento.bandas_json && Array.isArray(evento.bandas_json) && evento.bandas_json.length > 0) {
                    console.log('[BANDAS] Procesando bandas_json:', evento.bandas_json);
                    evento.bandas_json.forEach(banda => {
                        // Buscar en bandasDisponibles para obtener detalles completos
                        const match = bandasDisponibles.find(b => b.id_banda === banda.id_banda);
                        if (match) {
                            bandasSeleccionadas.push({ id_banda: match.id_banda, nombre: match.nombre, genero: match.genero_musical || '', logoUrl: match.logo_url || '' });
                        } else {
                            // Si no existe en bandasDisponibles, usar datos del backend
                            bandasSeleccionadas.push({ id_banda: banda.id_banda, nombre: banda.nombre, genero: '', logoUrl: '' });
                        }
                    });
                    console.log('[BANDAS] ✓ bandasSeleccionadas poblado (total ' + bandasSeleccionadas.length + ' bandas)');
                }

                renderBandasLista();
                renderBandasSeleccionadas();

                // IMPORTANTE: Si vinimos desde modo público (ev_X), reasignar eventoId al ID real de solicitud_fecha_bandas
                // porque el evento_id (4) es del evento_confirmado, no de solicitudes_fechas_bandas
                if (eventoPrefix === 'ev_' && evento.id_solicitud_fecha_banda) {
                    console.log('[BANDAS] Reasignando ID: evento=' + eventoId + ' → solicitud_fecha_banda=' + evento.id_solicitud_fecha_banda);
                    eventoId = evento.id_solicitud_fecha_banda;
                }

                // Marcar fecha como readonly si es evento existente (no editable)
                const fechaInput = document.getElementById('fechaEvento');
                if (eventoId && fechaInput) {
                    fechaInput.readOnly = true;
                    fechaInput.title = 'La fecha no puede ser editada para eventos confirmados';
                    console.log('[BANDAS] Fecha marcada como readonly (evento existente)');
                }

                if (evento.fecha_evento) {
                    try {
                        const ymd = typeof evento.fecha_evento === 'string' ? evento.fecha_evento.substring(0, 10) : evento.fecha_evento;
                        if (ymd && /^\d{4}-\d{2}-\d{2}$/.test(ymd)) {
                            calendario.setDate(ymd, false);
                            fechasSeleccionadas[0] = ymd;
                            updateFechaText(0);
                        }
                    } catch (err) {
                        console.error('[BANDAS] Error setDate fecha:', evento.fecha_evento, err);
                    }
                }
                // alternativa
                if (evento.fecha_alternativa) {
                    const altInput = document.getElementById('fechaAlternativa');
                    if (altInput) {
                        try {
                            const ymd2 = typeof evento.fecha_alternativa === 'string' ? evento.fecha_alternativa.substring(0,10) : evento.fecha_alternativa;
                            if (ymd2 && /^\d{4}-\d{2}-\d{2}$/.test(ymd2)) {
                                if (window.calendarioAlternativa) window.calendarioAlternativa.setDate(ymd2, false);
                                fechasSeleccionadas[1] = ymd2;
                                updateFechaText(1);
                            }
                        } catch (err) {
                            console.error('[BANDAS] Error setDate alternativa:', evento.fecha_alternativa, err);
                        }
                    }
                }

                if (evento.hora_inicio) {
                    document.getElementById('horaInicio').value = formatTime24(evento.hora_inicio);
                }

                // Guardar duración en el DOM para cálculo de hora fin
                if (evento.duracion) {
                    document.querySelector('[data-duracion]') ? document.querySelector('[data-duracion]').dataset.duracion = evento.duracion : null;
                    // Si no existe elemento con data-duracion, guardar en un div invisible o usar window
                    if (!document.querySelector('[data-duracion]')) {
                        window.duracionEvento = evento.duracion;
                        window.duracionCalculada = evento.duracion;  // También guardar en duracionCalculada
                        console.log('[HORARIOS] Duración guardada en window:', evento.duracion);
                    }
                }

                // Calcular hora de fin después de cargar horaInicio y duracion
                calcularHoraFin();
                if (evento.hora_fin) {
                    document.getElementById('horaFin').value = evento.hora_fin ? formatTime24(evento.hora_fin) : '';
                }

                document.getElementById('aforoMaximo').value = evento.aforo_maximo || 120;
                document.getElementById('esPublico').value = evento.es_publico ? '1' : '0';

                document.getElementById('precioAnticipada').value = evento.precio_anticipada || '';
                document.getElementById('precioPuerta').value = evento.precio_puerta || '';

                // Guardar cliente_id en campo oculto para permitir edición
                if (document.getElementById('clienteId')) {
                    document.getElementById('clienteId').value = evento.id_cliente || '';
                }

                // Cargar datos del cliente si existe (para llenar campos readonly en el formulario)
                if (evento.id_cliente) {
                    try {
                        const token = localStorage.getItem('authToken');
                        const clienteRes = await fetch(`/api/admin/clientes/${evento.id_cliente}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (clienteRes.ok) {
                            const cliente = await clienteRes.json();
                            console.log('[BANDAS] 📋 Datos del cliente en cargarEvento():', cliente);
                            document.getElementById('nombreContacto').value = cliente.nombre || '';
                            document.getElementById('emailContacto').value = cliente.email || '';
                            document.getElementById('telefonoContacto').value = cliente.telefono || '';
                        } else {
                            console.warn('[BANDAS] No se pudieron cargar datos del cliente');
                        }
                    } catch (err) {
                        console.error('[BANDAS] Error cargando cliente:', err);
                    }
                }

                // Mostrar/ocultar botón editar cliente (siempre visible para buscar/crear cliente)
                const btnEdit = document.getElementById('btnEditCliente');
                if (btnEdit) {
                    btnEdit.style.display = 'inline-block';
                }

                document.getElementById('estadoSelect').value = evento.estado || 'Solicitado';

                // Actualizar estado de botones según autenticación
                const authToken = localStorage.getItem('authToken');
                const hasAuth = authToken && typeof authToken === 'string' && authToken.trim().length > 0;
                const btnGuardar = document.getElementById('btnGuardar');
                const btnEliminar = document.getElementById('btnEliminar');

                if (!hasAuth) {
                    if (btnGuardar) { btnGuardar.disabled = true; btnGuardar.title = 'Requiere autenticación de administrador'; }
                    if (btnEliminar) { btnEliminar.disabled = true; btnEliminar.title = 'Requiere autenticación de administrador'; }
                    showNotification('Vista de solo lectura: no tiene autorización para editar. Inicie sesión como administrador.', 'warning');
                } else {
                    if (btnGuardar) { btnGuardar.disabled = false; }
                    if (btnEliminar) { btnEliminar.disabled = false; }
                }

            } catch (err) {
                console.error(err);
                showNotification('Error al cargar el evento: ' + err.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        async function guardarEvento() {
            console.log('[BANDAS] ========== GUARDAR EVENTO ==========');
            const fecha = document.getElementById('fechaEvento').value;
            const nombreEventoVal = document.getElementById('nombreEvento').value.trim();

            console.log('[BANDAS] eventoId:', eventoId);
            console.log('[BANDAS] fecha:', fecha);
            console.log('[BANDAS] nombreEventoVal:', nombreEventoVal);

            // Validar autenticación PRIMERO
            const authToken = localStorage.getItem('authToken');
            const hasAuth = authToken && typeof authToken === 'string' && authToken.trim().length > 0;

            console.log('[BANDAS] hasAuth:', hasAuth);

            if (!hasAuth) {
                showNotification('No tiene autorización para guardar. Por favor, inicie sesión como administrador.', 'error');
                return;
            }

            // Obtener datos de la banda a partir de la selección (si existe)
            const bandaSel = (bandasSeleccionadas && bandasSeleccionadas.length) ? bandasSeleccionadas[0] : null;
            const nombreBanda = bandaSel ? (bandaSel.nombre || '') : '';
            const idBanda = bandaSel ? bandaSel.id_banda : null;

            console.log('[BANDAS] bandaSel:', bandaSel);
            console.log('[BANDAS] nombreBanda:', nombreBanda);
            console.log('[BANDAS] idBanda:', idBanda);

            if (!nombreBanda || !idBanda) {
                showNotification('Debe haber una banda válida seleccionada', 'warning');
                return;
            }

            // Para eventos existentes, la fecha NO es requerida (no se debe editar)
            // Para nuevos eventos, se pide al menos una fecha (principal o alternativa)
            if (!eventoId && !fecha && !document.getElementById('fechaAlternativa').value) {
                showNotification('La fecha es obligatoria para nuevos eventos', 'warning');
                return;
            }

            showLoading(true);

            // Preparar datos para la API (mapear claves a lo que el backend espera)
            const horaInicio = document.getElementById('horaInicio').value.trim() || '21:00';
            const formatoHora = formatTime24(horaInicio);
            // fechas: principal + alternativa
            let fechaPrin = document.getElementById('fechaEvento').value;
            let fechaAlt = document.getElementById('fechaAlternativa').value || null;
            if (document.getElementById('usarAlt').checked && fechaAlt) {
                // swap
                const tmp = fechaPrin;
                fechaPrin = fechaAlt;
                fechaAlt = tmp;
            }

            if (!isValidTime(formatoHora)) {
                showNotification('Formato de hora inválido. Use HH:MM (ej: 21:30)', 'error');
                showLoading(false);
                return;
            }

            const datos = {
                id_banda: idBanda,
                fecha_evento: fechaPrin || undefined,
                fecha_alternativa: fechaAlt,
                descripcion: document.getElementById('descripcion').value.trim(),
                hora_evento: formatoHora,
                expectativa_publico: parseInt(document.getElementById('aforoMaximo').value, 10) || 120,
                es_publico: document.getElementById('esPublico').value === '1' ? 1 : 0,
                precio_puerta: document.getElementById('precioPuerta').value ? parseFloat(document.getElementById('precioPuerta').value) : null,
                url_flyer: document.getElementById('urlFlyer').value.trim(),
                estado: document.getElementById('estadoSelect').value
            };

            // Evitar enviar data:URI dentro del JSON (usar /api/uploads/flyers)
            if (datos.url_flyer && datos.url_flyer.startsWith('data:')) {
                showNotification('No envíe imágenes como data URI. Use el botón de subir para cargar el flyer.', 'error');
                showLoading(false);
                return;
            }

            // Nombre de la fecha / show -> persistir en la fila padre (solicitudes.descripcion_corta)
            if (nombreEventoVal) datos.descripcion_corta = nombreEventoVal;

            // Precio Anticipada -> mapear a precio_anticipada
            const precioAnt = parseFloat(document.getElementById('precioAnticipada').value) || null;
            if (precioAnt && precioAnt > 0) {
                datos.precio_anticipada = precioAnt;
            }

            // ID del cliente asociado
            const clienteId = document.getElementById('clienteId').value;
            if (clienteId) {
                datos.id_cliente = clienteId;
            }

            // Duración calculada (si ha sido modificada por el usuario)
            if (window.duracionCalculada) {
                datos.duracion = window.duracionCalculada;
                console.log('[BANDAS] Duración a enviar:', window.duracionCalculada);
            }

            // Bandas invitadas (si hay más de una seleccionada) -> enviar como invitadas_json
            if (bandasSeleccionadas && bandasSeleccionadas.length > 1) {
                // omitimos la primera (principal) y enviamos el resto como invitadas
                const invitadas = bandasSeleccionadas.slice(1).map(b => ({ id_banda: b.id_banda || null, nombre: b.nombre || '' }));
                datos.invitadas_json = invitadas;
                console.log('[BANDAS] Bandas invitadas a enviar:', invitadas);
            } else {
                console.log('[BANDAS] No hay bandas invitadas (solo una banda seleccionada)');
            }

            // Remover campos undefined
            Object.keys(datos).forEach(key => datos[key] === undefined && delete datos[key]);

            console.log('[BANDAS] ========== PAYLOAD COMPLETO A ENVIAR ==========');
            console.log('[BANDAS] ID Banda Principal:', datos.id_banda);
            console.log('[BANDAS] ID Cliente:', datos.id_cliente);
            console.log('[BANDAS] Fecha Evento:', datos.fecha_evento);
            console.log('[BANDAS] Hora Evento:', datos.hora_evento);
            console.log('[BANDAS] Duración:', datos.duracion);
            console.log('[BANDAS] Descripción:', datos.descripcion);
            console.log('[BANDAS] Descripción Corta (nombre evento):', datos.descripcion_corta);
            console.log('[BANDAS] Expectativa Público:', datos.expectativa_publico);
            console.log('[BANDAS] Es Público:', datos.es_publico);
            console.log('[BANDAS] Precio Anticipada:', datos.precio_anticipada);
            console.log('[BANDAS] Precio Puerta:', datos.precio_puerta);
            console.log('[BANDAS] URL Flyer:', datos.url_flyer);
            console.log('[BANDAS] Contacto Nombre:', datos.contacto_nombre);
            console.log('[BANDAS] Contacto Email:', datos.contacto_email);
            console.log('[BANDAS] Contacto Teléfono:', datos.contacto_telefono);
            console.log('[BANDAS] Invitadas JSON:', datos.invitadas_json);
            console.log('[BANDAS] PAYLOAD COMPLETO:', JSON.stringify(datos, null, 2));

            try {
                // Usar nuevo endpoint /api/solicitudes-fechas-bandas/:id
                const url = eventoId ? `/api/solicitudes-fechas-bandas/${eventoId}` : '/api/solicitudes-fechas-bandas';
                const method = eventoId ? 'PUT' : 'POST';

                console.log('[BANDAS] Envío - method:', method, 'url:', url);

                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(datos)
                });

                console.log('[BANDAS] Response status:', res.status);
                const resData = await res.json();
                console.log('[BANDAS] Response body:', resData);

                if (!res.ok) {
                    console.error('[BANDAS] ✗ Error HTTP:', res.status);
                    const debugInfo = resData.debug ? `\nDebug: ${JSON.stringify(resData.debug)}` : '';
                    throw new Error((resData.message || resData.error || 'Error al guardar') + debugInfo);
                }

                console.log('[BANDAS] ✓ Evento ' + (eventoId ? 'actualizado' : 'creado') + ' correctamente');
                showNotification(eventoId ? 'Los cambios se realizaron correctamente' : 'Evento creado correctamente', 'success');

                // NO redirigir - verificar logs primero

            } catch (err) {
                console.error('[BANDAS] ✗ Error:', err);
                showNotification('Error: ' + err.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        /* ------------------- Bandas: carga y UI (copiado/adaptado de solicitud_fecha_bandas.html) ------------------- */
        async function loadBandas() {
            try {
                const res = await fetch('/api/bandas');
                if (!res.ok) throw new Error('Error cargando bandas');
                bandasDisponibles = await res.json();

                // Reconciliar selecciones placeholder (si existen) con bandas cargadas por nombre
                if (bandasSeleccionadas && bandasSeleccionadas.length) {
                    bandasSeleccionadas = bandasSeleccionadas.map(sel => {
                        if (sel.id_banda) return sel;
                        const match = bandasDisponibles.find(b => (b.nombre || '').toLowerCase() === (sel.nombre || '').toLowerCase());
                        return match ? { id_banda: match.id_banda, nombre: match.nombre, genero: match.genero_musical || '', logoUrl: match.logo_url || '' } : sel;
                    });
                }

                renderBandasLista();
                renderBandasSeleccionadas();
            } catch (err) {
                console.error('Error cargando bandas:', err);
            }
        }

        function renderBandasLista() {
            const container = document.getElementById('bandasList');
            if (!container) return;
            const searchTerm = (document.getElementById('bandaSearch')?.value || '').toLowerCase();

            const filtered = bandasDisponibles.filter(b =>
                (b.nombre || '').toLowerCase().includes(searchTerm) ||
                ((b.genero_musical || '').toLowerCase().includes(searchTerm))
            );

            container.innerHTML = filtered.map(banda => {
                const isSelected = bandasSeleccionadas.some(b => b.id_banda === banda.id_banda);
                return `
                    <div class="banda-grid-item ${isSelected ? 'selected' : ''}" onclick="toggleBanda(${banda.id_banda}, '${escapeHtml(banda.nombre)}', '${escapeHtml(banda.genero_musical || '')}', '${escapeHtml(banda.logo_url || '')}')">>
                        <div class="banda-logo">
                            ${banda.logo_url && banda.logo_url.trim() ? `<img src="${banda.logo_url}" alt="${escapeHtml(banda.nombre)}" onerror="this.style.display='none'">` : ''}
                            ${!banda.logo_url || !banda.logo_url.trim() ? `<div class="banda-logo-placeholder"><i class="fas fa-music"></i></div>` : ''}
                        </div>
                        <div class="banda-grid-name">${escapeHtml(banda.nombre)}</div>
                        ${banda.genero_musical ? `<div class="banda-grid-genre">${escapeHtml(banda.genero_musical)}</div>` : ''}
                        <div class="checkbox-custom ${isSelected ? 'checked' : ''}">
                            ${isSelected ? '<i class="fas fa-check"></i>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (filtered.length === 0) container.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#9ca3af;">No hay bandas disponibles</div>';
        }

        function toggleBanda(id_banda, nombre, genero, logoUrl) {
            const idx = bandasSeleccionadas.findIndex(b => b.id_banda === id_banda);
            if (idx >= 0) {
                bandasSeleccionadas.splice(idx, 1);
            } else {
                // En edición permitimos hasta 5 bandas
                if (bandasSeleccionadas.length >= 5) {
                    showNotification('Máximo 5 bandas seleccionadas', 'warning');
                    return;
                }
                bandasSeleccionadas.push({ id_banda, nombre, genero, logoUrl });
            }
            renderBandasLista();
            renderBandasSeleccionadas();
        }

        function renderBandasSeleccionadas() {
            const container = document.getElementById('listaBandasSeleccionadas');
            if (!container) return;

            if (bandasSeleccionadas.length === 0) {
                container.innerHTML = '<div style="color:#9ca3af;text-align:center;padding:20px;">No hay bandas seleccionadas</div>';
                return;
            }

            container.innerHTML = bandasSeleccionadas.map((banda, idx) => `
                <div class="banda-seleccionada-item">
                    <div class="banda-numero">${idx + 1}</div>
                    <div class="banda-seleccionada-info">
                        <div class="banda-seleccionada-nombre">${escapeHtml(banda.nombre)}</div>
                        ${banda.genero ? `<div class="banda-seleccionada-genre">${escapeHtml(banda.genero)}</div>` : ''}
                    </div>
                    <div class="banda-seleccionada-actions">
                        ${idx > 0 ? `<button type="button" class="btn-reorder" onclick="reorderBanda(${idx}, 'up')" title="Mover arriba"><i class="fas fa-arrow-up"></i></button>` : ''}
                        ${idx < bandasSeleccionadas.length - 1 ? `<button type="button" class="btn-reorder" onclick="reorderBanda(${idx}, 'down')" title="Mover abajo"><i class="fas fa-arrow-down"></i></button>` : ''}
                        <button type="button" class="btn-remove" onclick="toggleBanda(${banda.id_banda || 'null'}, '${escapeHtml(banda.nombre)}', '${escapeHtml(banda.genero || '')}', '${escapeHtml(banda.logoUrl || '')}')" title="Eliminar"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function reorderBanda(idx, direction) {
            if (direction === 'up' && idx > 0) {
                [bandasSeleccionadas[idx], bandasSeleccionadas[idx - 1]] = [bandasSeleccionadas[idx - 1], bandasSeleccionadas[idx]];
            } else if (direction === 'down' && idx < bandasSeleccionadas.length - 1) {
                [bandasSeleccionadas[idx], bandasSeleccionadas[idx + 1]] = [bandasSeleccionadas[idx + 1], bandasSeleccionadas[idx]];
            }
            renderBandasSeleccionadas();
        }

        function updateFlyerPreview() {
            console.log('[FLYER] ===== updateFlyerPreview() INICIADA =====');
            try {
                console.log('[FLYER] Buscando elementos del DOM...');
                const urlInput = document.getElementById('urlFlyer');
                const previewContainer = document.getElementById('flyerPreview');

                console.log('[FLYER] urlInput:', urlInput ? 'ENCONTRADO' : 'NO ENCONTRADO');
                console.log('[FLYER] previewContainer:', previewContainer ? 'ENCONTRADO' : 'NO ENCONTRADO');

                if (!urlInput) {
                    console.warn('[FLYER] ❌ Element #urlFlyer no encontrado');
                    return;
                }
                if (!previewContainer) {
                    console.warn('[FLYER] ❌ Element #flyerPreview no encontrado');
                    return;
                }

                const url = urlInput.value.trim();
                console.log('[FLYER] updateFlyerPreview - URL recibida:', url);

                if (!url) {
                    console.log('[FLYER] URL vacía, mostrando placeholder');
                    previewContainer.innerHTML = '<div class="preview-placeholder"><i class="fas fa-image" style="font-size:2rem;margin-bottom:6px;display:block;"></i><p style="margin:0;font-size:0.75rem;">Sin<br>flyer</p></div>';
                    return;
                }

                // Mostrar loading mientras carga
                previewContainer.innerHTML = '<div style="padding:24px;text-align:center;color:#9ca3af;"><i class="fas fa-spinner fa-pulse" style="font-size:1.4rem"></i><div style="font-size:0.8rem;margin-top:6px;">Cargando preview...</div></div>';

                // Crear imagen y asignar listeners ANTES de establecer src (importante para imágenes en caché)
                const img = document.createElement('img');
                img.alt = 'Flyer preview';
                img.style.maxWidth = '100%';
                img.style.maxHeight = '100%';

                // Asignar listeners PRIMERO
                img.onload = function () {
                    console.log('[FLYER] ✓ Imagen cargada exitosamente desde:', url);
                    previewContainer.innerHTML = '';
                    previewContainer.appendChild(img);
                };

                img.onerror = function () {
                    console.warn('[FLYER] ✗ Error cargando imagen desde:', url);
                    console.warn('[FLYER]   Status: Image failed to load (network/CORS/404)');
                    previewContainer.innerHTML = '<div class="preview-placeholder"><i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:6px;display:block;"></i><p style="margin:0;font-size:0.75rem;">Error al<br>cargar img</p></div>';
                };

                // Establecer src ÚLTIMO (dispara la carga/caché)
                img.src = url;

            } catch (err) {
                console.error('[FLYER] ✗ Error en updateFlyerPreview:', err.message);
                try {
                    const previewContainer = document.getElementById('flyerPreview');
                    if (previewContainer) {
                        previewContainer.innerHTML = '<div class="preview-placeholder"><i class="fas fa-image" style="font-size:2rem;margin-bottom:6px;display:block;"></i><p style="margin:0;font-size:0.75rem;">Error<br>preview</p></div>';
                    }
                } catch (e) { /* fallback */ }
            }
        }

        function handleFlyerUpload() {
            const fileInput = document.getElementById('flyerFile');
            const urlInput = document.getElementById('urlFlyer');
            const btnGuardar = document.getElementById('btnGuardar');
            const file = fileInput.files[0];

            if (!file) return;

            // Validar tipo y tamaño (máx 3MB)
            const allowed = ['image/png', 'image/jpeg'];
            const maxSize = 3 * 1024 * 1024;
            if (!allowed.includes(file.type)) {
                showNotification('Formato no soportado. Use JPG o PNG.', 'error');
                fileInput.value = '';
                return;
            }
            if (file.size > maxSize) {
                showNotification('La imagen no puede superar 3 MB', 'error');
                fileInput.value = '';
                return;
            }

            // Estado UI: deshabilitar guardar mientras sube
            if (btnGuardar) btnGuardar.disabled = true;
            showNotification('Subiendo flyer...', 'info');
            document.getElementById('flyerPreview').innerHTML = '<div style="padding:24px;text-align:center;color:#9ca3af;"><i class="fas fa-spinner fa-pulse" style="font-size:1.4rem"></i><div style="font-size:0.8rem;margin-top:6px;">Subiendo...</div></div>';

            const form = new FormData();
            form.append('flyer', file);

            // Pasar solicitudId como query param para que se guarde con nombre consistente
            const uploadUrl = eventoId
                ? `/api/uploads/flyers?solicitudId=${eventoId}`
                : '/api/uploads/flyers';

            fetch(uploadUrl, {
                method: 'POST',
                body: form
            }).then(async res => {
                if (!res.ok) {
                    const txt = await res.text().catch(() => '');
                    throw new Error((res.status ? res.status + ' ' : '') + (txt || res.statusText || 'Error al subir'));
                }
                return res.json();
            }).then(json => {
                if (json && json.url) {
                    urlInput.value = json.url;
                    updateFlyerPreview();
                    showNotification('Flyer subido correctamente', 'success');
                } else {
                    throw new Error('Respuesta inválida del servidor');
                }
            }).catch(err => {
                console.error('Error subiendo flyer:', err);
                showNotification('Error al subir el flyer: ' + (err.message || ''), 'error');
                // limpiar preview / input en caso de error
                document.getElementById('flyerPreview').innerHTML = '<div class="preview-placeholder"><i class="fas fa-image" style="font-size:2rem;margin-bottom:6px;display:block;"></i><p style="margin:0;font-size:0.75rem;">Sin<br>flyer</p></div>';
                urlInput.value = '';
                fileInput.value = '';
            }).finally(() => {
                if (btnGuardar) btnGuardar.disabled = false;
            });
        }
