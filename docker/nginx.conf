server {
    listen 80;
    server_name localhost; # Puedes cambiar esto por tu dominio si lo tienes
    charset utf-8;

    # Aumentar límite de upload a 50MB (para flyers, logos, etc.)
    client_max_body_size 50M;

    # Configuración para servir los archivos estáticos de tu frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html; # Para Single Page Applications (SPA)
    }

    # NO cachear archivos JavaScript (siempre traer versión fresca)
    location ~* \.js$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Bloquear endpoints legacy explícitos (devuelven 404)
    location ~* /api/(admin|tickets)/fechas_bandas_confirmadas {
        return 404;
    }

    # SSE (Server-Sent Events) — endpoint watch: deshabilitar buffering para que los eventos lleguen de inmediato
    location /api/mercadopago/watch {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Crítico para SSE: deshabilitar buffering de respuesta
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;   # 1 hora sin timeout
        proxy_send_timeout 3600s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering "no";
    }

    # Proxy inverso para las solicitudes a tu API de backend
    # Todas las solicitudes que empiecen con /api/ serán reenviadas al servicio backend de Node.js
    location /api/ {
        proxy_pass http://backend:3000; # Nombre del servicio de Docker Compose
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Servir uploads (logos, fotos) a través del backend para que las URLs /uploads/* funcionen en el frontend
    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
